name: Check Base Image Updates

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:

jobs:
  check-base-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Geodesic Version
        id: check-version
        run: |
          LATEST=$(curl -s https://hub.docker.com/v2/repositories/cloudposse/geodesic/tags | jq -r '.results[0].name')
          CURRENT=$(grep 'FROM cloudposse/geodesic' .devcontainer/dockerfile | cut -d':' -f2)
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-version.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(deps): update geodesic base image to ${{ steps.check-version.outputs.new_version }}'
          title: '⬆️ Update Geodesic base image to ${{ steps.check-version.outputs.new_version }}'
          body: |
            Updates the base Geodesic image to the latest version.
            
            This PR was automatically generated to keep the development container up to date.
          branch: update-base-image
          delete-branch: true
          labels: |
            dependencies
            automated 