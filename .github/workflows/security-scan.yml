name: Security Scan and Fix

on:
  push:
    branches: [ main ]
    paths:
      - '.devcontainer/**'
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Mondays
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install security tools
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.1
          
          # Install govulncheck
          go install golang.org/x/vuln/cmd/govulncheck@latest
          
          # Install npm for Node.js dependencies
          npm install -g npm@latest
          
          # Install safety for Python dependencies
          pip install safety

      - name: Scan and Fix Vulnerabilities
        id: vulncheck
        run: |
          UPDATES=""
          
          echo "Running Trivy filesystem scan..."
          TRIVY_RESULTS=$(trivy fs --format json .)
          
          # Process Go vulnerabilities
          if [ -f "go.mod" ]; then
            echo "Checking Go vulnerabilities..."
            VULNS=$(govulncheck ./... -json | jq -r '.vulns[]? | "\(.pkg)@\(.fixed[0])"' | sort -u)
            if [ ! -z "$VULNS" ]; then
              while IFS= read -r vuln; do
                if [ ! -z "$vuln" ]; then
                  PKG=$(echo $vuln | cut -d'@' -f1)
                  VERSION=$(echo $vuln | cut -d'@' -f2)
                  echo "Updating $PKG to $VERSION"
                  go get -u "$vuln"
                  UPDATES="${UPDATES}- Updated $PKG to $VERSION\n"
                fi
              done <<< "$VULNS"
              go mod tidy
            fi
          fi
          
          # Process npm vulnerabilities
          if [ -f "package.json" ]; then
            echo "Checking npm vulnerabilities..."
            npm audit fix
            if [ $? -eq 0 ]; then
              UPDATES="${UPDATES}- Updated npm packages\n"
            fi
          fi
          
          # Process Python vulnerabilities
          if [ -f "requirements.txt" ]; then
            echo "Checking Python vulnerabilities..."
            PYTHON_VULNS=$(safety check -r requirements.txt --json)
            if [ ! -z "$PYTHON_VULNS" ]; then
              safety fix
              UPDATES="${UPDATES}- Updated Python packages\n"
            fi
          fi
          
          # Store updates for PR
          {
            echo "SECURITY_FIXES<<EOF"
            echo -e "$UPDATES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.vulncheck.outputs.SECURITY_FIXES != ''
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'fix(security): update dependencies to fix vulnerabilities'
          title: '🔒 Fix security vulnerabilities'
          body: |
            This PR fixes security vulnerabilities found in dependencies:
            
            ${{ steps.vulncheck.outputs.SECURITY_FIXES }}
            
            This PR was automatically generated by the security scan workflow.
          branch: fix-security-vulnerabilities
          delete-branch: true
          labels: |
            security
            dependencies
            automated 