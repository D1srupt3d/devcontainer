name: Check Software Updates

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Latest Versions
        id: versions
        run: |
          # Get latest versions
          STARSHIP=$(curl -s https://api.github.com/repos/starship/starship/releases/latest | jq -r .tag_name)
          LAZYGIT=$(curl -s https://api.github.com/repos/jesseduffield/lazygit/releases/latest | jq -r .tag_name)
          NODE_LTS=$(curl -s https://nodejs.org/dist/index.json | jq -r '[.[] | select(.lts != false)][0].version')
          
          # Store versions for PR
          echo "UPDATES<<EOF" >> $GITHUB_ENV
          echo "- Starship: $STARSHIP" >> $GITHUB_ENV
          echo "- Lazygit: $LAZYGIT" >> $GITHUB_ENV
          echo "- Node.js LTS: $NODE_LTS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(deps): update internal tools to latest versions'
          title: '⬆️ Update internal tools to latest versions'
          body: |
            Updates internal tools to their latest versions:
            
            ${{ env.UPDATES }}
            
            This PR was automatically generated to keep the development tools up to date.
          branch: update-internal-tools
          delete-branch: true
          labels: |
            dependencies
            automated 